l_english:
 estex_tournament_grounds_01_domicile_building: "Tournament Grounds"
 estex_tournament_grounds_01_domicile_building_desc: "An open field kept clear for riding, sparring and the occasional local melee. Every great tourney starts as someone's back paddock."
 estex_berfrois_02_domicile_building: "Berfrois"
 estex_berfrois_02_domicile_building_desc: "Raised timber stands where the lord and his guests watch the lists in comfort. Half the tournament happens in the seats."
 estex_jousting_lists_03_domicile_building: "Jousting Lists"
 estex_jousting_lists_03_domicile_building_desc: "Fenced lanes, painted barriers and a herald who knows everyone's colors. The finest lances in the realm break here."
 estex_archery_butts_03_domicile_building: "Archery Butts"
 estex_archery_butts_03_domicile_building_desc: "Earthen banks and straw targets where the common folk practice their draw. Less glamorous than the joust, far more useful in war."
