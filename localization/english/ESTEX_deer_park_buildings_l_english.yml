l_english:
 estex_warren_01_domicile_building: "Game Warren"
 estex_warren_01_domicile_building_desc: "Rabbits, hares and fowl kept on the estate grounds. Modest sport, steady meat for the table."
 estex_deer_park_02_domicile_building: "Deer Park"
 estex_deer_park_02_domicile_building_desc: "Hunting grounds enclosed behind a wooden pale, stocked with deer. Keeping one is a statement in itself."
 estex_chase_03_domicile_building: "The Chase"
 estex_chase_03_domicile_building_desc: "A sprawling private hunting territory with its own keepers and hounds. Neighbors talk about it, which is rather the point."
 estex_fishponds_03_domicile_building: "Warren & Fishponds"
 estex_fishponds_03_domicile_building_desc: "The park given over to coney warrens and stocked fishponds. Less glamorous than the hunt, but the kitchens never go without."
